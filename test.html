<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>★ 予測検索テスト（本番環境とは完全に独立）</title>
  <style>
    /* ====== FROZEN (UI・スタイル領域：完成済み) ====== */
    body { background-color: #0f172a; color: #f8fafc; font-family: 'Segoe UI', sans-serif; padding: 20px; margin: 0; }
    .header { text-align: center; margin-bottom: 20px; }
    .header h3 { color: #f59e0b; margin: 0 0 5px 0; }
    .header p { font-size: 12px; color: #94a3b8; margin: 0; }
    
    .input-container { position: relative; width: 100%; max-width: 500px; margin: 0 auto; }
    
    input[type="text"] { width: 100%; padding: 15px; border-radius: 8px; border: 1px solid #334155; background-color: #1e293b; color: #fff; font-size: 16px; outline: none; box-sizing: border-box; }
    
    .suggestion-box { position: absolute; top: 100%; left: 0; width: 100%; max-height: 250px; overflow-y: auto; background-color: #1e293b; border: 1px solid #475569; border-top: none; border-radius: 0 0 8px 8px; z-index: 9999; display: none; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5); }
    
    .suggestion-item { padding: 16px 15px; border-bottom: 1px solid #334155; color: #f8fafc; font-size: 16px; font-weight: bold; cursor: pointer; }
    .suggestion-item:active { background-color: #334155; }
  </style>
</head>
<body>

  <div class="header">
    <h3>★ 予測検索テスト</h3>
    <p>本番環境(index.html)とは完全に独立しています</p>
  </div>

  <div class="input-container">
    <input type="text" id="testKeyword" placeholder="ブランド名を入力（例：ば）" autocomplete="off">
    <div id="suggestionBox" class="suggestion-box"></div>
  </div>

  <p style="font-size: 14px; margin-top: 30px; color: #cbd5e1;">
    【テスト方法】<br>
    「ば」と打つと「バーバリー」などカタカナのみが出ます。<br>
    「b」と打つと「BURBERRY」などアルファベットのみが出ます。
  </p>

  <script>
    /* ====== FROZEN (要素取得とUI制御: 完全に仕上がった聖域) ====== */
    const inputField = document.getElementById('testKeyword');
    const suggestionBox = document.getElementById('suggestionBox');

    // 画面外タップで閉じる処理（誤動作防止）
    document.addEventListener('touchstart', function(e) {
      if (e.target !== inputField && !suggestionBox.contains(e.target)) {
        suggestionBox.style.display = 'none';
      }
    });
    document.addEventListener('click', function(e) {
      if (e.target !== inputField && !suggestionBox.contains(e.target)) {
        suggestionBox.style.display = 'none';
      }
    });


    /* ====== STABLE (基本機能・データ構造: エラーなく正常動作する基準) ====== */
    // 【棲み分け辞書】英語とカタカナを完全に分離して管理
    const brandDictionary = [
      { en: "BURBERRY", kana: "バーバリー" },
      { en: "BALENCIAGA", kana: "バレンシアガ" },
      { en: "BALLY", kana: "バリー" },
      { en: "BARNEYS NEWYORK", kana: "バーニーズニューヨーク" },
      { en: "BEAMS", kana: "ビームス" },
      { en: "BOTTEGA VENETA", kana: "ボッテガヴェネタ" },
      { en: "BVLGARI", kana: "ブルガリ" }
    ];

    // 【変換ツール】ひらがなをカタカナに変換する機能
    function hiraToKata(str) {
      return str.replace(/[\u3041-\u3096]/g, function(match) {
        var chr = match.charCodeAt(0) + 0x60;
        return String.fromCharCode(chr);
      });
    }


    /* ====== PATCH (棲み分け＆ドリルダウン検索ロジック: 今回の修正・テストエリア) ====== */
    inputField.addEventListener('input', function() {
      const val = this.value;
      suggestionBox.innerHTML = ''; 

      if (!val) {
        suggestionBox.style.display = 'none';
        return;
      }

      // 【棲み分け判定】
      const isEnglishInput = /^[a-zA-Z0-9\s]+$/.test(val);
      let matches = [];

      // ▼▼▼ 今回の修正箇所（Old/New分離） ▼▼▼
      if (isEnglishInput) {
        // 【Old Code（部分一致：連動しない原因）】
        // const lowerVal = val.toLowerCase();
        // matches = brandDictionary.filter(b => b.en.toLowerCase().includes(lowerVal)).map(b => b.en);
        
        // 【New Code（前方一致：ドリルダウンの実現）】
        const lowerVal = val.toLowerCase();
        matches = brandDictionary
          .filter(b => b.en.toLowerCase().startsWith(lowerVal))
          .map(b => b.en); 
      } else {
        // 【Old Code（部分一致：連動しない原因）】
        // const kataVal = hiraToKata(val);
        // matches = brandDictionary.filter(b => b.kana.includes(kataVal)).map(b => b.kana);
        
        // 【New Code（前方一致：ドリルダウンの実現）】
        const kataVal = hiraToKata(val);
        matches = brandDictionary
          .filter(b => b.kana.startsWith(kataVal))
          .map(b => b.kana); 
      }
      // ▲▲▲ ここまで ▲▲▲

      // 画面表示処理（一切変更なし・安定稼働）
      if (matches.length > 0) {
        matches.forEach(brandName => {
          const div = document.createElement('div');
          div.className = 'suggestion-item';
          div.textContent = brandName; 
          
          div.onclick = function() {
            inputField.value = brandName; 
            suggestionBox.style.display = 'none'; 
          };
          suggestionBox.appendChild(div);
        });
        suggestionBox.style.display = 'block'; 
      } else {
        suggestionBox.style.display = 'none'; 
      }
    });
/* ====== PATCH END ====== */
  </script>
</body>
</html>
