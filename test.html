<!--======始点:FROZEN======-->
<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="https://myusei35-cpu.github.io/BlueStar-Standard/manifest.json">
  <title>BlueStar Research Hub</title>

  <style>
    /* ====== FROZEN (最新プレミアムデザイン版) ====== */
    /* bodyを透明にし、::beforeで背景色を再現する。
       こうすることで fixed な .bottom-panel の backdrop-filter が
       「後ろのスクロールコンテンツ」を正しくブラーできるようになる。 */
    html {
  background-color: #0b1120;
}
body { 
  margin: 0; padding: 0; font-family: 'Helvetica Neue', Arial, sans-serif; 
  background-color: transparent; color: #f8fafc; 
  overscroll-behavior-y: contain;
  min-height: 100vh;
  padding-bottom: 240px;
}
    
    .header { 
      padding: 15px; text-align: center; font-size: 1.3em; font-weight: 800; 
      letter-spacing: 1px; background: linear-gradient(135deg, #1e293b, #0f172a);
      box-shadow: 0 4px 15px rgba(0,0,0,0.5); border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .header span.star { color: #3b82f6; margin-right: 8px; text-shadow: 0 0 10px rgba(59, 130, 246, 0.8); }

    .container { max-width: 640px; margin: 0 auto; padding: 0; position: relative; }
    
    .site-list { padding: 16px; } 
    
    .site-card { 
      background-color: #1e293b; border: 1px solid rgba(255,255,255,0.1); 
      border-radius: 16px; padding: 16px; margin-bottom: 12px; 
      display: flex; justify-content: space-between; align-items: center; 
      box-shadow: 0 4px 10px rgba(0,0,0,0.3); 
    }
    .site-card .logo-container { 
      width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;
      background-color: #334155; border-radius: 8px; flex-shrink: 0;
    }
    .site-card .logo-container img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; }
    
    .site-card .site-info { flex-grow: 1; padding: 0 16px; }
    .site-card .site-info .title { font-weight: 700; font-size: 1.1em; margin-bottom: 4px; color: #e2e8f0; }
    .site-card .site-info .desc { font-size: 0.8em; color: #94a3b8; }
    
    .site-card button.open-btn { 
      background-color: #334155; border: 1px solid rgba(255,255,255,0.1); 
      border-radius: 20px; padding: 8px 16px; color: #e2e8f0; font-weight: bold; font-size: 0.9em;
      flex-shrink: 0;
    }

    /* ====== 【修正】ボトムパネル：本物のすりガラス効果 ====== */
    /*
     * 問題の原因：
     *   backdrop-filter は Android Chrome/WebView では動作が不安定。
     *   さらに body が不透明(#0b1120)なので backdrop-filter が効いても
     *   「透ける先」がなく、効果がゼロになっていた。
     *
     * 解決策：
     *   backdrop-filter に頼らず、グラデーション＋半透明の重ね合わせで
     *   「すりガラス風」の見た目を再現する。
     *   上端をやや透明にして、下部を不透明にすることで
     *   「コンテンツがパネルの奥に溶け込む」視覚効果を出す。
     */
    .bottom-panel {
  position: fixed; bottom: 0; left: 0; width: 100%;
  background: transparent;
  border-radius: 24px 24px 0 0;
  padding: 16px;
  padding-top: 36px;
  box-sizing: border-box; z-index: 1000;
}
.bottom-panel::before {
  content: '';
  position: absolute; top: -48px; left: 0; right: 0; bottom: 0;
  background: linear-gradient(
    to bottom,
    rgba(11, 17, 32, 0)    0%,
    rgba(11, 17, 32, 0.65) 28%,
    rgba(11, 17, 32, 0.95) 52%,
    rgba(11, 17, 32, 1)    100%
  );
  border-radius: 24px 24px 0 0;
  pointer-events: none;
  z-index: -1;
}
.bottom-panel::after {
  content: '';
  position: absolute; top: 0; left: 8%; right: 8%; height: 1px;
  background: linear-gradient(to right, transparent, rgba(255,255,255,0.15), transparent);
  pointer-events: none;
}

    .search-row { margin-bottom: 15px; position: relative; display: flex; align-items: center;}
    
    .input-wrapper { position: relative; flex-grow: 1; }
    .input-wrapper input[type="text"] { 
      width: 100%; padding: 14px 35px 14px 16px; box-sizing: border-box;
      border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; 
      background-color: rgba(255,255,255,0.07); color: #fff; font-size: 1em; outline: none;
    }
    .clear-btn {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      cursor: pointer; color: #94a3b8; font-size: 1.2em; display: none; 
    }

    .suggestion-box { 
      position: absolute; bottom: 100%; left: 0; width: 100%; 
      background-color: #1e293b; border: 1px solid rgba(255,255,255,0.1); 
      border-radius: 12px; margin-bottom: 8px; box-shadow: 0 -4px 15px rgba(0,0,0,0.5);
      max-height: 200px; overflow-y: auto; display: none; 
    }
    .suggestion-item { padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.05); color: #e2e8f0; cursor: pointer;}
    .suggestion-item:active { background-color: #334155; }

    .button-row { display: flex; gap: 12px; }
    .btn-generate { 
      flex: 1; background-color: #ef4444; color: #fff; border: none; 
      border-radius: 12px; padding: 14px 0; font-weight: bold; font-size: 1.05em;
      box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3); cursor: pointer;
    }
    .btn-action-menu { 
      flex: 2; background-color: #059669; color: #fff; border: none; 
      border-radius: 12px; padding: 14px 0; font-weight: bold; font-size: 1.05em;
      box-shadow: 0 4px 12px rgba(5, 150, 105, 0.3); cursor: pointer;
    }
    .btn-lens {
      flex: 1; background-color: #dc2626; color: #fff; border: none; 
      border-radius: 12px; padding: 14px 0; font-weight: bold; font-size: 1.05em;
      box-shadow: 0 4px 12px rgba(220, 38, 38, 0.3); cursor: pointer; display: none;
    }

    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); display: none; align-items: flex-end; z-index: 2000; }
    
    .modal-overlay[style*="display: flex"] .modal-content {
        animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
    }

    .modal-content { 
      background: rgba(255, 255, 255, 0.08); 
      backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
      width: 100%; border-radius: 24px 24px 0 0; 
      padding: 20px; box-sizing: border-box; text-align: center; 
      transform: translateY(100%); 
      border-top: 1px solid rgba(255, 255, 255, 0.2);
    }
    @keyframes slideUp { 
        0% { transform: translateY(100%); } 
        100% { transform: translateY(0); } 
    }
    
    .modal-btn { display: block; width: 100%; padding: 16px; margin-bottom: 12px; background-color: #334155; color: #fff; border: none; border-radius: 12px; font-size: 1.1em; font-weight: bold; cursor: pointer;}
    .modal-btn.camera { background-color: #059669; }
    .modal-btn.cancel { background-color: transparent; border: 1px solid #64748b; color: #94a3b8; margin-bottom: 0; }

    .alert { color: #f87171; margin: 10px 0; text-align: center; font-weight: bold; display: none;}
  </style>
</head>
<body>
  <div class="header"><span class="star">★</span>BLUESTAR RESEARCH HUB</div>

  <div class="container">
    <div class="alert" id="alert"></div>
    
    <div class="site-list" id="siteList"></div>

    <div class="bottom-panel">
      <div class="search-row">
        <div class="input-wrapper">
          <input id="keyword" type="text" placeholder="🔍 キーワードを入力" autocomplete="off" oninput="toggleClearBtn(this.value)">
          <span class="clear-btn" id="clearBtn" onclick="document.getElementById('keyword').value=''; this.style.display='none'; document.getElementById('suggestionBox').style.display='none';">❌</span>
          <div id="suggestionBox" class="suggestion-box"></div>
        </div>
      </div>

      <div class="button-row">
        <button class="btn-generate" onclick="generateLinks()">生成</button>
        <button class="btn-action-menu" onclick="openActionMenu()">📸 アクション選択</button>
        <button id="lensSubmitBtn" class="btn-lens" onclick="finalLensSubmit()">レンズへ転送</button>
      </div>

      <input type="file" id="imageInput" accept="image/*" style="display:none;" onchange="showLensSubmit()">
    </div>
  </div>

  <div id="modalOverlay" class="modal-overlay">
    <div class="modal-content">
      <button class="modal-btn camera" onclick="document.getElementById('imageInput').setAttribute('capture', 'environment'); document.getElementById('imageInput').click(); closeActionMenu();">📸 カメラを起動</button>
      <button class="modal-btn" onclick="document.getElementById('imageInput').removeAttribute('capture'); document.getElementById('imageInput').click(); closeActionMenu();">📁 ファイルを選択</button>
      <button class="modal-btn cancel" onclick="closeActionMenu()">キャンセル</button>
    </div>
  </div>

  <script>
    function toggleClearBtn(val) {
      document.getElementById('clearBtn').style.display = val.length > 0 ? 'block' : 'none';
    }

    //======始点: PATCH======
    function generateLinks() {
      const keyword = document.getElementById('keyword').value.trim();
      document.getElementById('keyword').blur(); 
      document.getElementById('suggestionBox').style.display = 'none';

      const alertBox = document.getElementById('alert');
      if (!keyword) {
        alertBox.innerText = '⚠️ キーワードを入力してください';
        alertBox.style.display = 'block';
        return;
      }
      alertBox.style.display = 'none';

      const encKey = encodeURIComponent(keyword);

      const sites = [
        {
          name: 'トレファク',
          desc: '店舗在庫',
          img: 'https://myusei35-cpu.github.io/BlueStar-Standard/trefac.jpg', 
          url: `https://www.treasure-f.com/search/?word=${encKey}`
        },
        {
          name: 'カインドオル',
          desc: 'ブランド古着',
          img: 'https://myusei35-cpu.github.io/BlueStar-Standard/kindal.jpg', 
          url: `https://shop.kind.co.jp/item_list/?kw=${encKey}`
        },
        {
          name: 'セカンドストリート',
          desc: '店舗在庫',
          img: 'https://myusei35-cpu.github.io/BlueStar-Standard/2ndstreet.jpg', 
          url: `https://www.2ndstreet.jp/search?keyword=${encKey}`
        },
        {
          name: 'ヤフオク',
          desc: '落札相場',
          img: 'https://myusei35-cpu.github.io/BlueStar-Standard/yahoo.jpg', 
          url: `https://auctions.yahoo.co.jp/closedsearch/closedsearch?va=${encKey}`
        },
        {
          name: 'メルカリ：販売中',
          desc: 'ライバル確認',
          img: 'https://myusei35-cpu.github.io/BlueStar-Standard/mercari.jpg', 
          url: `https://jp.mercari.com/search?keyword=${encKey}&status=on_sale`
        },
        {
          name: 'メルカリ：売り切れ',
          desc: '相場確認',
          img: 'https://myusei35-cpu.github.io/BlueStar-Standard/mercari.jpg', 
          url: `https://jp.mercari.com/search?keyword=${encKey}&status=sold_out`
        }
      ];

      let html = '';
      sites.forEach(site => {
        html += `
          <div class="site-card">
            <div class="logo-container" style="background-color: #fff;">
              <img src="${site.img}" style="width: 100%; height: 100%; object-fit: contain; padding: 4px; box-sizing: border-box; border-radius: 8px;">
            </div>
            <div class="site-info">
              <div class="title">${site.name}</div>
              <div class="desc">${site.desc}</div>
            </div>
            <button class="open-btn" onclick="window.open('${site.url}', '_blank')">開く ➔</button>
          </div>
        `;
      });

      document.getElementById('siteList').innerHTML = html;

      setTimeout(() => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }, 100);
    }
    //======終点: PATCH======
  </script>

<!--======始点:STABLE======-->
  <div id="actionModal" class="modal-overlay" onclick="closeActionMenu(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
      <h3 style="margin-top: 0; margin-bottom: 20px; font-size: 1.1em; color: #cbd5e1;">画像を選択してください</h3>
      <button class="modal-btn camera" onclick="openCamera()">📸 カメラで撮影</button>
      <button class="modal-btn" onclick="openGallery()">📁 アルバムから選択</button>
      <button class="modal-btn cancel" onclick="closeActionMenu(event)">キャンセル</button>
    </div>
  </div>

  <script>
  var geminiMode = false;

  let brandDictionary = []; 
  fetch('brand.csv')
    .then(response => response.text())
    .then(text => {
      const lines = text.split('\n');
      lines.forEach(line => {
        if (!line.trim()) return;
        const cols = line.split(','); 
        const nameEn = cols[1] ? cols[1].replace(/"/g, '').replace(/^[　\s]+|[　\s]+$/g, '') : "";
        const nameKana = cols[2] ? cols[2].replace(/"/g, '').replace(/^[　\s]+|[　\s]+$/g, '') : "";
        if(nameEn || nameKana) brandDictionary.push({ en: nameEn, kana: nameKana });
      });
    })
    .catch(error => console.error('CSVエラー:', error));

  function hiraToKata(str) {
    return str.replace(/[\u3041-\u3096]/g, function(match) {
      return String.fromCharCode(match.charCodeAt(0) + 0x60);
    });
  }

  const inputField = document.getElementById('keyword');
  const suggestionBox = document.getElementById('suggestionBox');

  inputField.addEventListener('input', function() {
    const val = this.value;
    suggestionBox.innerHTML = ''; 
    if (!val) { suggestionBox.style.display = 'none'; return; }

    const isEnglishInput = /^[a-zA-Z0-9\s]+$/.test(val);
    let matches = [];

    if (isEnglishInput) {
      const lowerVal = val.toLowerCase();
      matches = brandDictionary.filter(b => b.en.toLowerCase().startsWith(lowerVal)).map(b => b.en); 
    } else {
      const kataVal = hiraToKata(val);
      matches = brandDictionary.filter(b => b.kana.startsWith(kataVal)).map(b => b.kana); 
    }

    if (matches.length > 0) {
      matches.forEach(brandName => {
        const div = document.createElement('div');
        div.className = 'suggestion-item';
        div.textContent = brandName; 
        div.onclick = function() { inputField.value = brandName; suggestionBox.style.display = 'none'; };
        suggestionBox.appendChild(div);
      });
      suggestionBox.style.display = 'block'; 
    } else {
      suggestionBox.style.display = 'none'; 
    }
  });

  document.addEventListener('click', function(e) {
    if (e.target !== inputField && e.target !== suggestionBox) suggestionBox.style.display = 'none';
  });

  function openActionMenu() { document.getElementById('actionModal').style.display = 'flex'; }
  function closeActionMenu(e) { if(e) e.preventDefault(); document.getElementById('actionModal').style.display = 'none'; }

  function toggleGemini() {
    geminiMode = !geminiMode;
    var btn = document.getElementById('geminiToggle');
    if (btn) {
      btn.textContent = geminiMode ? 'Gemini: ON' : 'Gemini: OFF';
      btn.classList.toggle('on', geminiMode);
    }
  }

  function openGallery() {
    closeActionMenu();
    var input = document.getElementById('imageInput');
    input.removeAttribute('capture');
    input.click();
  }

  function openCamera() {
    closeActionMenu();
    var input = document.getElementById('imageInput');
    input.setAttribute('capture', 'environment');
    input.click();
  }

  function openFinalURL(url) {
    var targetPath = url.replace(/^https?:\/\//, '');
    var intentUrl = (url.indexOf('mercari.com') !== -1) 
      ? 'intent://' + targetPath + '#Intent;scheme=https;package=com.kouzoh.mercari;end;'
      : 'intent://' + targetPath + '#Intent;scheme=https;end;';
    var a = document.createElement('a');
    a.href = intentUrl;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }

  function showLensSubmit() {
    var fileInput = document.getElementById('imageInput');
    if (fileInput.files && fileInput.files[0]) {
      document.getElementById('lensSubmitBtn').style.display = 'inline-block';
    }
  }

  function finalLensSubmit() {
    var fileInput = document.getElementById('imageInput');
    var keyword = document.getElementById('keyword').value.trim();
    if (!fileInput.files || !fileInput.files[0]) return;

    var searchKw = keyword ? keyword + " メルカリ" : "メルカリ";
    var file = fileInput.files[0];

    var newWin = window.open('', '_blank');
    if (!newWin) return alert('ポップアップを許可してください');
    var doc = newWin.document;
    doc.open();
    doc.write('<html><head><meta name="referrer" content="no-referrer"></head><body style="background:#0f172a; color:#fff; text-align:center; padding-top:20%;"><p>画像を最適化してLensへ転送中...</p></body></html>');
    doc.close();

    var img = new Image();
    var url = URL.createObjectURL(file);
    img.onload = function() {
      URL.revokeObjectURL(url); 
      var canvas = document.createElement('canvas');
      canvas.width = img.width;
      canvas.height = img.height;
      var ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);

      canvas.toBlob(function(blob) {
        var correctedFile = new File([blob], "image.jpg", { type: "image/jpeg" });
        var form = doc.createElement('form');
        form.method = 'POST';
        form.action = 'https://lens.google.com/upload?ep=gisbubu&hl=ja&q=' + encodeURIComponent(searchKw);
        form.enctype = 'multipart/form-data';

        var dataInput = doc.createElement('input');
        dataInput.type = 'file';
        dataInput.name = 'encoded_image';

        var container = new DataTransfer();
        container.items.add(correctedFile);
        dataInput.files = container.files;

        form.appendChild(dataInput);
        doc.body.appendChild(form);
        form.submit();

        document.getElementById('lensSubmitBtn').style.display = 'none';
        fileInput.value = '';
      }, 'image/jpeg', 0.9);
    };
    img.src = url;
  }

  window.addEventListener('load', function() {
    var params = new URLSearchParams(window.location.search);
    var kw = params.get('keyword');
    if (kw) { document.getElementById('keyword').value = decodeURIComponent(kw); }

    document.addEventListener('paste', function(e) {
      if (!e.clipboardData || !e.clipboardData.items) return;
      var items = e.clipboardData.items;
      for (var i = 0; i < items.length; i++) {
        if (items[i].type.indexOf("image") !== -1) {
          var file = items[i].getAsFile();
          var fileInput = document.getElementById('imageInput');
          var container = new DataTransfer();
          container.items.add(file);
          fileInput.files = container.files;
          showLensSubmit();
        }
      }
    });
  });
  </script>
  
  <script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
  </script>
<!--======終点:STABLE======-->
</body>
</html>
