<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="https://myusei35-cpu.github.io/BlueStar-Standard/manifest.json">
  <title>BlueStar Research Hub</title>

  <style>
    /* ====== FROZEN (スタイル保護) ====== */
    body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background-color: #0f172a; color: #f8fafc; }
    .header { background-color: #1e293b; padding: 15px; text-align: center; font-size: 1.4em; font-weight: bold; }
    .header span.star { color: #f59e0b; margin-right: 6px; }
    .container { max-width: 640px; margin: 20px auto; padding: 0 20px; }
    .input-row { display: flex; gap: 10px; margin-bottom: 15px; align-items: center; flex-wrap: wrap; }
    .input-row input[type="text"] { flex-grow: 1; padding: 12px 14px; border: none; border-radius: 6px; background-color: #334155; color: #f8fafc; font-size: 1em; outline: none; }
    .btn-generate { background-color: #dc2626; color: #ffffff; border: none; border-radius: 6px; padding: 12px 16px; font-weight: bold; cursor: pointer; }
    .control-row { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .control-row button { flex: 1; min-width: 120px; padding: 12px 16px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: #ffffff; }
    .btn-lens { background-color: #475569; }
    .btn-camera { background-color: #059669; }
    .btn-all { background-color: #475569; }
    .btn-gemini { background-color: #7c3aed; }
    .alert { color: #f87171; margin-bottom: 15px; display: none; }
    .site-card { background-color: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 12px 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
    .site-info .title { font-weight: bold; margin-bottom: 4px; }
    .site-info .desc { font-size: 0.82em; color: #94a3b8; }
    .site-card button { background-color: #2563eb; border: none; border-radius: 6px; padding: 8px 14px; color: #ffffff; font-weight: bold; }
  </style>
</head>
<body>
  <div class="header"><span class="star">★</span>BLUESTAR RESEARCH HUB</div>
  <div class="container">
    <div class="input-row">
      <div style="position: relative; flex: 1; display: flex;">
        <input id="keyword" type="text" placeholder="キーワードを入力" />
        <span onclick="document.getElementById('keyword').value=''" style="position: absolute; right: 8px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #888;">❌</span>
      </div>
      
      <input type="file" id="imageInput" accept="image/*" style="display:none;" onchange="showLensSubmit()">
      <button id="lensSubmitBtn" style="display:none; background:#dc2626; color:#fff; border:none; border-radius:6px; padding:10px 12px; font-weight:bold; white-space:nowrap;" onclick="finalLensSubmit()">
        レンズ連携
      </button>

      <button class="btn-generate" onclick="generateLinks()">生成</button>
    </div>

    <div class="alert" id="alert"></div>
    
    <div class="control-row">
      <button class="btn-lens" onclick="openGallery()">📁 画像選択</button>
      <button class="btn-camera" onclick="openCamera()">📸 カメラ</button>
      <button class="btn-all" onclick="openAll()">全サイト</button>
      <button id="geminiToggle" class="btn-gemini" onclick="toggleGemini()">Gemini: OFF</button>
      <button style="background-color: #ea4335;" onclick="launchNativeLens()">🔍 レンズ起動</button>
    </div>
    
    <div class="site-list" id="siteList"></div>
  </div>

<script>
  /* ====== STABLE (完全統合版プログラム) ====== */
  var geminiMode = false;

  // Geminiモード切替
  function toggleGemini() {
    geminiMode = !geminiMode;
    var btn = document.getElementById('geminiToggle');
    btn.textContent = geminiMode ? 'Gemini: ON' : 'Gemini: OFF';
    btn.classList.toggle('on', geminiMode);
  }

  // 画像選択（アルバム）
  function openGallery() {
    var input = document.getElementById('imageInput');
    input.removeAttribute('capture');
    input.click();
  }

  // 直接カメラ（広角対応）
  function openCamera() {
    var input = document.getElementById('imageInput');
    input.setAttribute('capture', 'environment');
    input.click();
  }

  // 本物のレンズアプリを直接起動
  function launchNativeLens() {
    var intentUrl = 'intent://#Intent;action=android.intent.action.VIEW;component=com.google.android.googlequicksearchbox/com.google.android.apps.search.lens.LensActivity;end;';
    var a = document.createElement('a');
    a.href = intentUrl;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }

  // メルカリ本物アプリ直結
  function openFinalURL(url) {
    var targetPath = url.replace(/^https?:\/\//, '');
    var intentUrl = (url.indexOf('mercari.com') !== -1) 
      ? 'intent://' + targetPath + '#Intent;scheme=https;package=com.kouzoh.mercari;end;'
      : 'intent://' + targetPath + '#Intent;scheme=https;end;';
    var a = document.createElement('a');
    a.href = intentUrl;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }

  /* --- 【復活】レンズ連携コアロジック --- */
  function showLensSubmit() {
    var fileInput = document.getElementById('imageInput');
    if (fileInput.files && fileInput.files[0]) {
      document.getElementById('lensSubmitBtn').style.display = 'inline-block';
    }
  }

  function finalLensSubmit() {
    var fileInput = document.getElementById('imageInput');
    var keyword = document.getElementById('keyword').value.trim();
    if (!fileInput.files || !fileInput.files[0]) return;

    var searchKw = keyword ? keyword + " メルカリ" : "メルカリ";
    var newWin = window.open('', '_blank');
    if (!newWin) return alert('ポップアップを許可してください');

    var doc = newWin.document;
    doc.open();
    doc.write('<html><head><meta name="referrer" content="no-referrer"></head><body><p>Lens転送中...</p></body></html>');
    doc.close();

    var form = doc.createElement('form');
    form.method = 'POST';
    form.action = 'https://lens.google.com/upload?ep=gisbubu&hl=ja&q=' + encodeURIComponent(searchKw);
    form.enctype = 'multipart/form-data';

    var dataInput = doc.createElement('input');
    dataInput.type = 'file';
    dataInput.name = 'encoded_image';
    
    var container = new DataTransfer();
    container.items.add(fileInput.files[0]);
    dataInput.files = container.files;

    form.appendChild(dataInput);
    doc.body.appendChild(form);
    form.submit();

    document.getElementById('lensSubmitBtn').style.display = 'none';
    fileInput.value = '';
  }

  // リンク生成
  function generateLinks() {
    var keyword = document.getElementById('keyword').value.trim();
    var alertEl = document.getElementById('alert');
    if (!keyword) {
      alertEl.textContent = 'キーワードを入力してください';
      alertEl.style.display = 'block';
      return;
    }
    alertEl.style.display = 'none';
    var encoded = encodeURIComponent(keyword);
    var sites = [
      { title: 'メルカリ：売り切れ', desc: '相場確認', url: 'https://jp.mercari.com/search?keyword=' + encoded + '&status=sold_out&item_condition_id=3&seller_type=0&sort=created_at&order=desc' },
      { title: 'メルカリ：販売中', desc: 'ライバル確認', url: 'https://jp.mercari.com/search?keyword=' + encoded + '&status=on_sale&item_condition_id=3&seller_type=0&sort=created_at&order=desc' },
      { title: 'ヤフオク', desc: '落札相場', url: 'https://auctions.yahoo.co.jp/search/search?p=' + encoded + '&stf=1&s1=new&o1=d' },
      { title: 'セカンドストリート', desc: '店舗在庫', url: 'https://www.2ndstreet.jp/search?keyword=' + encoded },
      { title: 'トレファク', desc: '店舗在庫', url: 'https://www.trefac.jp/search?q=' + encoded },
      { title: 'カインドオル', desc: 'ブランド古着', url: 'https://shop.kind.co.jp/search?keyword=' + encoded }
    ];
    var listEl = document.getElementById('siteList');
    listEl.innerHTML = '';
    sites.forEach(function(site) {
      var card = document.createElement('div');
      card.className = 'site-card';
      card.innerHTML = '<div class="site-info"><div class="title">' + site.title + '</div><div class="desc">' + site.desc + '</div></div><button onclick="openFinalURL(\'' + site.url + '\')">開く</button>';
      listEl.appendChild(card);
    });
    if (geminiMode) {
      var prompt = 'あなたはプロの物販セラーです。最新の相場を検索して報告してください。回答は必ず指定のテンプレートを遵守してください。\n商品名：' + keyword;
      openFinalURL('https://gemini.google.com/app?q=' + encodeURIComponent(prompt));
    }
  }

  function openAll() { document.querySelectorAll('#siteList button').forEach(btn => btn.click()); }

  window.addEventListener('load', function() {
    var params = new URLSearchParams(window.location.search);
    var kw = params.get('keyword');
    if (kw) { document.getElementById('keyword').value = decodeURIComponent(kw); }

    // クリップボードからの画像ペースト対応
    document.addEventListener('paste', function(e) {
      if (!e.clipboardData || !e.clipboardData.items) return;
      var items = e.clipboardData.items;
      for (var i = 0; i < items.length; i++) {
        if (items[i].type.indexOf("image") !== -1) {
          var file = items[i].getAsFile();
          var fileInput = document.getElementById('imageInput');
          var container = new DataTransfer();
          container.items.add(file);
          fileInput.files = container.files;
          showLensSubmit();
        }
      }
    });
  });
</script>
</body>
</html>
