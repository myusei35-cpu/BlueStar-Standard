<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="https://myusei35-cpu.github.io/BlueStar-Standard/manifest.json">
  <title>BlueStar Research Hub</title>

  <style>
    /* ====== FROZEN (スタイル保護) ====== */
    body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background-color: #0f172a; color: #f8fafc; }
    .header { background-color: #1e293b; padding: 15px; text-align: center; font-size: 1.4em; font-weight: bold; }
    .header span.star { color: #f59e0b; margin-right: 6px; }
    .container { max-width: 640px; margin: 20px auto; padding: 0 20px; }
    .input-row { display: flex; gap: 10px; margin-bottom: 15px; align-items: center; flex-wrap: wrap; }
    .input-row input[type="text"] { flex-grow: 1; padding: 12px 14px; border: none; border-radius: 6px; background-color: #334155; color: #f8fafc; font-size: 1em; outline: none; }
    .btn-generate { background-color: #dc2626; color: #ffffff; border: none; border-radius: 6px; padding: 12px 16px; font-weight: bold; cursor: pointer; }
    
    .control-row { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .control-row button { flex: 1; min-width: 120px; padding: 12px 16px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: #ffffff; }
    .btn-action-menu { background-color: #059669; font-size: 1.1em; } 
    .btn-all { background-color: #475569; }
    .btn-gemini { background-color: #7c3aed; }
    
    .alert { color: #f87171; margin-bottom: 15px; display: none; }
    .site-card { background-color: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 12px 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
    .site-info .title { font-weight: bold; margin-bottom: 4px; }
    .site-info .desc { font-size: 0.82em; color: #94a3b8; }
    .site-card button { background-color: #2563eb; border: none; border-radius: 6px; padding: 8px 14px; color: #ffffff; font-weight: bold; }
    
    .suggestion-box { position: absolute; top: 100%; left: 0; width: 100%; background-color: #1e293b; border: 1px solid #334155; border-radius: 6px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); z-index: 1000; max-height: 200px; overflow-y: auto; display: none; }
    .suggestion-item { padding: 10px 14px; cursor: pointer; border-bottom: 1px solid #334155; color: #f8fafc; }
    .suggestion-item:last-child { border-bottom: none; }
    .suggestion-item:active { background-color: #334155; }

    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); display: none; align-items: flex-end; z-index: 2000; }
    .modal-content { background-color: #1e293b; width: 100%; border-radius: 16px 16px 0 0; padding: 20px; box-sizing: border-box; text-align: center; animation: slideUp 0.3s ease-out; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal-btn { display: block; width: 100%; padding: 16px; margin-bottom: 12px; background-color: #334155; color: #fff; border: none; border-radius: 8px; font-size: 1.1em; font-weight: bold; cursor: pointer; }
    .modal-btn.camera { background-color: #059669; }
    .modal-btn.cancel { background-color: transparent; border: 1px solid #64748b; color: #94a3b8; margin-bottom: 0; }

    /* ====== 新機能：仕入れ登録ポップアップ用スタイル ====== */
    .blustar-modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 3000; }
    .blustar-content { background-color: #1e293b; width: 90%; max-width: 500px; border-radius: 12px; padding: 20px; box-sizing: border-box; position: relative; max-height: 90vh; overflow-y: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.5); animation: popIn 0.2s ease-out; }
    @keyframes popIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .blustar-close { position: absolute; top: 12px; right: 15px; color: #94a3b8; font-size: 28px; font-weight: bold; cursor: pointer; line-height: 1; }
    .blustar-content h2 { text-align: center; color: #fff; margin-top: 0; margin-bottom: 20px; font-size: 1.2em; border-bottom: 1px solid #334155; padding-bottom: 10px; }
    .blustar-form-group { margin-bottom: 15px; text-align: left; }
    .blustar-form-group label { display: block; margin-bottom: 5px; font-size: 13px; font-weight: bold; color: #94a3b8; }
    .blustar-form-group input { width: 100%; padding: 12px; border: 1px solid #334155; border-radius: 6px; background: #0f172a; color: #fff; box-sizing: border-box; font-size: 16px; }
    .btn-submit-blustar { width: 100%; padding: 15px; background-color: #0056b3; color: white; border: none; border-radius: 6px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 6px rgba(0,86,179,0.3); }
    .btn-submit-blustar:disabled { background-color: #475569; box-shadow: none; }
  </style>
</head>
<body>
  <div class="header"><span class="star">★</span>BLUESTAR RESEARCH HUB</div>
  <div class="container">
    <div class="input-row">
      <div style="position: relative; flex: 1; display: flex;">
        <input id="keyword" type="text" placeholder="キーワードを入力" autocomplete="off" />
        <span onclick="document.getElementById('keyword').value=''; document.getElementById('suggestionBox').style.display='none';" style="position: absolute; right: 8px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #888;">❌</span>
        <div id="suggestionBox" class="suggestion-box"></div>
      </div>
      
      <input type="file" id="imageInput" accept="image/*" style="display:none;" onchange="showLensSubmit()">
      <button id="lensSubmitBtn" style="display:none; background:#dc2626; color:#fff; border:none; border-radius:6px; padding:10px 12px; font-weight:bold; white-space:nowrap;" onclick="finalLensSubmit()">
        レンズへ転送
      </button>

      <button class="btn-generate" onclick="generateLinks()">生成</button>
    </div>

    <div class="alert" id="alert"></div>
    
    <div class="control-row">
      <button class="btn-action-menu" onclick="openActionMenu()">📸 アクション選択</button>
      <button class="btn-all" onclick="openAll()">全サイト</button>
      <button id="geminiToggle" class="btn-gemini" onclick="toggleGemini()">Gemini: OFF</button>
      <button onclick="openBlustarModal()" style="flex-basis: 100%; background-color: #0056b3; margin-top: 5px; padding: 15px; font-size: 1.1em; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.2);">📦 爆速仕入れ登録を開く</button>
    </div>
    
    <div class="site-list" id="siteList"></div>
  </div>

  <div id="actionModal" class="modal-overlay" onclick="closeActionMenu(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
      <h3 style="margin-top: 0; margin-bottom: 20px; font-size: 1.1em; color: #cbd5e1;">画像を選択してください</h3>
      <button class="modal-btn camera" onclick="openCamera()">📸 カメラで撮影</button>
      <button class="modal-btn" onclick="openGallery()">📁 アルバムから選択</button>
      <button class="modal-btn cancel" onclick="closeActionMenu(event)">キャンセル</button>
    </div>
  </div>

  <div id="blustarModal" class="blustar-modal-overlay" onclick="closeBlustarModal(event)">
    <div class="blustar-content" onclick="event.stopPropagation()">
      <span class="blustar-close" onclick="closeBlustarModal()">&times;</span>
      <h2>📦 爆速仕入れ登録</h2>
      <form id="purchaseForm">
        <div class="blustar-form-group"><label>仕入先</label><input type="text" id="vendor" placeholder="例: セカスト"></div>
        <div class="blustar-form-group"><label>支払元</label><input type="text" id="payment" placeholder="例: クレカ"></div>
        <div class="blustar-form-group"><label>仕入値</label><input type="number" id="price" placeholder="例: 1500"></div>
        <div class="blustar-form-group"><label>送料</label><input type="number" id="shipping" value="0"></div>
        <div class="blustar-form-group"><label>画像URL</label><input type="text" id="imageUrl" placeholder="画像のURLをコピペ"></div>
        <div class="blustar-form-group"><label>商品名</label><input type="text" id="itemName" placeholder="例: NIKE パーカー"></div>
        <div class="blustar-form-group"><label>サイズ</label><input type="text" id="size" placeholder="例: L"></div>
        <div class="blustar-form-group"><label>型番</label><input type="text" id="model" placeholder="例: NK-1234"></div>
        <div class="blustar-form-group"><label>状態</label><input type="text" id="condition" placeholder="例: B"></div>
        <button type="button" class="btn-submit-blustar" id="submitBtn" onclick="sendDataToGAS()">仕入れ登録</button>
      </form>
    </div>
  </div>

<script>
  /* ====== STABLE (既存の機能すべて維持) ====== */
  var geminiMode = false;

  let brandDictionary = []; 
  fetch('brand.csv')
    .then(response => response.text())
    .then(text => {
      const lines = text.split('\n');
      lines.forEach(line => {
        if (!line.trim()) return;
        const cols = line.split(','); 
        const nameEn = cols[1] ? cols[1].replace(/"/g, '').replace(/^[　\s]+|[　\s]+$/g, '') : "";
        const nameKana = cols[2] ? cols[2].replace(/"/g, '').replace(/^[　\s]+|[　\s]+$/g, '') : "";
        if(nameEn || nameKana) brandDictionary.push({ en: nameEn, kana: nameKana });
      });
    })
    .catch(error => console.error('CSVエラー:', error));

  function hiraToKata(str) {
    return str.replace(/[\u3041-\u3096]/g, function(match) {
      return String.fromCharCode(match.charCodeAt(0) + 0x60);
    });
  }

  const inputField = document.getElementById('keyword');
  const suggestionBox = document.getElementById('suggestionBox');

  inputField.addEventListener('input', function() {
    const val = this.value;
    suggestionBox.innerHTML = ''; 
    if (!val) { suggestionBox.style.display = 'none'; return; }

    const isEnglishInput = /^[a-zA-Z0-9\s]+$/.test(val);
    let matches = [];

    if (isEnglishInput) {
      const lowerVal = val.toLowerCase();
      matches = brandDictionary.filter(b => b.en.toLowerCase().startsWith(lowerVal)).map(b => b.en); 
    } else {
      const kataVal = hiraToKata(val);
      matches = brandDictionary.filter(b => b.kana.startsWith(kataVal)).map(b => b.kana); 
    }

    if (matches.length > 0) {
      matches.forEach(brandName => {
        const div = document.createElement('div');
        div.className = 'suggestion-item';
        div.textContent = brandName; 
        div.onclick = function() { inputField.value = brandName; suggestionBox.style.display = 'none'; };
        suggestionBox.appendChild(div);
      });
      suggestionBox.style.display = 'block'; 
    } else {
      suggestionBox.style.display = 'none'; 
    }
  });

  document.addEventListener('click', function(e) {
    if (e.target !== inputField && e.target !== suggestionBox) suggestionBox.style.display = 'none';
  });

  function openActionMenu() { document.getElementById('actionModal').style.display = 'flex'; }
  function closeActionMenu(e) { if(e) e.preventDefault(); document.getElementById('actionModal').style.display = 'none'; }

  function toggleGemini() {
    geminiMode = !geminiMode;
    var btn = document.getElementById('geminiToggle');
    btn.textContent = geminiMode ? 'Gemini: ON' : 'Gemini: OFF';
    btn.classList.toggle('on', geminiMode);
  }

  function openGallery() {
    closeActionMenu();
    var input = document.getElementById('imageInput');
    input.removeAttribute('capture');
    input.click();
  }

  function openCamera() {
    closeActionMenu();
    var input = document.getElementById('imageInput');
    input.setAttribute('capture', 'environment');
    input.click();
  }

  function openFinalURL(url) {
    var targetPath = url.replace(/^https?:\/\//, '');
    var intentUrl = (url.indexOf('mercari.com') !== -1) 
      ? 'intent://' + targetPath + '#Intent;scheme=https;package=com.kouzoh.mercari;end;'
      : 'intent://' + targetPath + '#Intent;scheme=https;end;';
    var a = document.createElement('a');
    a.href = intentUrl;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }

  function showLensSubmit() {
    var fileInput = document.getElementById('imageInput');
    if (fileInput.files && fileInput.files[0]) {
      document.getElementById('lensSubmitBtn').style.display = 'inline-block';
    }
  }

  function finalLensSubmit() {
    var fileInput = document.getElementById('imageInput');
    var keyword = document.getElementById('keyword').value.trim();
    if (!fileInput.files || !fileInput.files[0]) return;

    var searchKw = keyword ? keyword + " メルカリ" : "メルカリ";
    var file = fileInput.files[0];

    var newWin = window.open('', '_blank');
    if (!newWin) return alert('ポップアップを許可してください');
    var doc = newWin.document;
    doc.open();
    doc.write('<html><head><meta name="referrer" content="no-referrer"></head><body style="background:#0f172a; color:#fff; text-align:center; padding-top:20%;"><p>画像を最適化してLensへ転送中...</p></body></html>');
    doc.close();

    var img = new Image();
    var url = URL.createObjectURL(file);
    img.onload = function() {
      URL.revokeObjectURL(url); 
      var canvas = document.createElement('canvas');
      canvas.width = img.width;
      canvas.height = img.height;
      var ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);

      canvas.toBlob(function(blob) {
        var correctedFile = new File([blob], "image.jpg", { type: "image/jpeg" });
        var form = doc.createElement('form');
        form.method = 'POST';
        form.action = 'https://lens.google.com/upload?ep=gisbubu&hl=ja&q=' + encodeURIComponent(searchKw);
        form.enctype = 'multipart/form-data';

        var dataInput = doc.createElement('input');
        dataInput.type = 'file';
        dataInput.name = 'encoded_image';

        var container = new DataTransfer();
        container.items.add(correctedFile);
        dataInput.files = container.files;

        form.appendChild(dataInput);
        doc.body.appendChild(form);
        form.submit();

        document.getElementById('lensSubmitBtn').style.display = 'none';
        fileInput.value = '';
      }, 'image/jpeg', 0.9);
    };
    img.src = url;
  }

  function generateLinks() {
    var keyword = document.getElementById('keyword').value.trim();
    var alertEl = document.getElementById('alert');
    if (!keyword) {
      alertEl.textContent = 'キーワードを入力してください';
      alertEl.style.display = 'block';
      return;
    }
    alertEl.style.display = 'none';
    var encoded = encodeURIComponent(keyword);
    var sites = [
      { title: 'メルカリ：売り切れ', desc: '相場確認', url: 'https://jp.mercari.com/search?keyword=' + encoded + '&status=sold_out&item_condition_id=3&seller_type=0&sort=created_at&order=desc' },
      { title: 'メルカリ：販売中', desc: 'ライバル確認', url: 'https://jp.mercari.com/search?keyword=' + encoded + '&status=on_sale&item_condition_id=3&seller_type=0&sort=created_at&order=desc' },
      { title: 'ヤフオク', desc: '落札相場', url: 'https://auctions.yahoo.co.jp/search/search?p=' + encoded + '&stf=1&s1=new&o1=d' },
      { title: 'セカンドストリート', desc: '店舗在庫', url: 'https://www.2ndstreet.jp/search?keyword=' + encoded },
      { title: 'トレファク', desc: '店舗在庫', url: 'https://www.trefac.jp/search?q=' + encoded },
      { title: 'カインドオル', desc: 'ブランド古着', url: 'https://shop.kind.co.jp/search?keyword=' + encoded }
    ];
    var listEl = document.getElementById('siteList');
    listEl.innerHTML = '';
    sites.forEach(function(site) {
      var card = document.createElement('div');
      card.className = 'site-card';
      card.innerHTML = '<div class="site-info"><div class="title">' + site.title + '</div><div class="desc">' + site.desc + '</div></div><button onclick="openFinalURL(\'' + site.url + '\')">開く</button>';
      listEl.appendChild(card);
    });
    if (geminiMode) {
      var prompt = 'あなたはプロの物販セラーです。最新の相場を検索して報告してください。回答は必ず指定のテンプレートを遵守してください。\n商品名：' + keyword;
      openFinalURL('https://gemini.google.com/app?q=' + encodeURIComponent(prompt));
    }
  }

  function openAll() { document.querySelectorAll('#siteList button').forEach(btn => btn.click()); }

  window.addEventListener('load', function() {
    var params = new URLSearchParams(window.location.search);
    var kw = params.get('keyword');
    if (kw) { document.getElementById('keyword').value = decodeURIComponent(kw); }

    document.addEventListener('paste', function(e) {
      if (!e.clipboardData || !e.clipboardData.items) return;
      var items = e.clipboardData.items;
      for (var i = 0; i < items.length; i++) {
        if (items[i].type.indexOf("image") !== -1) {
          var file = items[i].getAsFile();
          var fileInput = document.getElementById('imageInput');
          var container = new DataTransfer();
          container.items.add(file);
          fileInput.files = container.files;
          showLensSubmit();
        }
      }
    });
  });

  /* ====== 新機能：ポップアップ開閉用プログラム ====== */
  function openBlustarModal() {
    document.getElementById('blustarModal').style.display = 'flex';
  }
  
  function closeBlustarModal(e) {
    if (e && e.target !== document.getElementById('blustarModal')) return;
    document.getElementById('blustarModal').style.display = 'none';
  }

  /* ====== 爆速仕入れ用のGAS送信プログラム ====== */
  const WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbzQioxuTfTnnRkegCqoI0ZcCX7-it6rKyuc77pgpsMz-QC5YdMmQsrEPwn0ItX4wKnd/exec";

  function sendDataToGAS() {
    const btn = document.getElementById("submitBtn");
    btn.disabled = true;
    btn.innerText = "送信中...";

    const data = {
      vendor: document.getElementById("vendor").value,
      payment: document.getElementById("payment").value,
      price: document.getElementById("price").value,
      shipping: document.getElementById("shipping").value,
      imageUrl: document.getElementById("imageUrl").value,
      itemName: document.getElementById("itemName").value,
      size: document.getElementById("size").value,
      model: document.getElementById("model").value,
      condition: document.getElementById("condition").value
    };

    fetch(WEBHOOK_URL, {
      method: "POST",
      body: JSON.stringify(data)
    })
    .then(response => response.json())
    .then(result => {
      alert("✅ スプレッドシートの一番下へ登録完了しました！");
      document.getElementById("purchaseForm").reset();
      document.getElementById("shipping").value = "0";
      closeBlustarModal(); // 送信成功時にポップアップを自動で閉じる
    })
    .catch(error => {
      alert("❌ 通信エラー: " + error);
    })
    .finally(() => {
      btn.disabled = false;
      btn.innerText = "仕入れ登録";
    });
  }
</script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
</body>
</html>
